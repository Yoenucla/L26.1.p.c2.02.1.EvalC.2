<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empresa - HTML Plano</title>
</head>

<body>

  <section id="body">
    <h2>La Empresa (HTML Plano)</h2>
    <button id="body_btNuevoEmpleado">Nuevo empleado</button>
    <hr>
    <div>
      El empleado con mayor aumento es: <span id="body_lblNombreMayorAumento">N/A</span>
    <br>
      La nómina nueva es: <span id="body_lblNuevaNomina">0</span>$
    </div>
  </section>

  <section id="empleado" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h5 id="empleado_lblEmpleado">Procesar Empleado</h5>
    <div>
      <label>Nombre:
        <input type="text" id="empleado_inNombre" placeholder="Nombre del empleado">
      </label>
    </div>
    <div>
      <label>Cédula:
        <input type="number" id="empleado_inCedula" placeholder="Ej: 25123456">
      </label>
    </div>
    <div>
      <label>Sueldo Actual:
        <input type="number" id="empleado_inSueldoActual" placeholder="Ej: 1000">
      </label>
    </div>
    <div>
      <label>Años Trabajados:
        <input type="number" id="empleado_inAnTrabajados" placeholder="Ej: 5">
      </label>
    </div>
    <br>
    <button id="empleado_btCancelar">Cancelar</button>
    <button id="empleado_btAceptar">Aceptar</button>
  </section>

  <script type="module">
    import Cl_cEmpleado from "./dist/controllers/Cl_cEmpleado.js";
    import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";

    import Cl_vEmpresaPlain from "./dist/views/Cl_vEmpresaPlain.js";
    import Cl_vEmpleadoPlain from "./dist/views/Cl_vEmpleadoPlain.js";

    const vistaEmpleado = new Cl_vEmpleadoPlain();
    const vistaEmpresa = new Cl_vEmpresaPlain();

    const controladorEmpleado = new Cl_cEmpleado(vistaEmpleado);
    new Cl_cEmpresa(vistaEmpresa, controladorEmpleado);
  </script>
</body>

</html>
